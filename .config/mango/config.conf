# mango config — translated from niri/config.kdl
# More options: https://mangowm.github.io/docs

# ── Environment variables ─────────────────────────────────────────────────────
# (from niri: environment { QT_QPA_PLATFORM "wayland" ... })
env=QT_QPA_PLATFORM,wayland
env=XDG_SESSION_TYPE,wayland
env=QT_QPA_PLATFORMTHEME,qt6ct
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=LIBVA_DRIVER_NAME,nvidia
env=__GLX_VENDOR_LIBRARY_NAME,nvidia
# env=QT_AUTO_SCREEN_SCALE_FACTOR,1
# env=QT_WAYLAND_FORCE_DPI,140

# ── Autostart ─────────────────────────────────────────────────────────────────
# (from niri: spawn-at-startup)
exec-once=dms run --daemon

# ── Window Effects ────────────────────────────────────────────────────────────
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# Shadows (from niri: shadow { on; softness 7; spread 2; offset x=2 y=3; color "#111111" })
shadows=1
layer_shadows=1
shadow_only_floating=0
shadows_size=4
shadows_blur=10
shadows_position_x=0
shadows_position_y=1
shadowscolor=0x000000e6

# in libwlroots-0.19 during animation ticks (mango bug). Set to 0 until fixed.
border_radius=7 disabled: triggers wlr_scene_subsurface_tree_set_clip assertion
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# ── Animations ────────────────────────────────────────────────────────────────
# (from niri: animations { window-open/close/horizontal-view-movement/workspace-switch spring … })
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=0
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=400
animation_duration_open=400
animation_duration_tag=400
animation_duration_close=350
animation_duration_focus=0
animation_curve_open=0.46,1.2,0.29,1
animation_curve_move=0.46,1.2,0.29,1
animation_curve_tag=0.46,1.2,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.2,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.2,0.29,1

# ── Scroller Layout ───────────────────────────────────────────────────────────
# Closest equivalent to niri's native scrolling-column layout.
# (from niri: layout { gaps 10; default-column-width { proportion 0.5; };
#             preset-column-widths { proportion 0.33333; 0.5; 0.66667; } })
scroller_structs=10
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.33,0.5,0.67

# ── Master-Stack Layout ───────────────────────────────────────────────────────
new_is_master=0
default_mfact=0.50
default_nmaster=1
smartgaps=0

# ── Dwindle Layout ────────────────────────────────────────────────────────────
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# ── Overview ──────────────────────────────────────────────────────────────────
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# ── Miscellaneous ─────────────────────────────────────────────────────────────
syncobj_enable=0
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=0
idleinhibit_ignore_visible=0
# sloppyfocus = focus-follows-mouse (from niri: focus-follows-mouse)
sloppyfocus=1
# warpcursor = warp-mouse-to-focus (from niri: warp-mouse-to-focus)
warpcursor=1
# allow focus to cross monitors (from niri: focus-column-or-monitor-left/right)
focus_cross_monitor=1
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# ── Keyboard ──────────────────────────────────────────────────────────────────
# (from niri: input { keyboard { xkb { layout "it(us)"; options "caps:swapescape"; } } })
repeat_rate=25
repeat_delay=600
numlockon=0
# niri used layout "it(us)" — Italian layout, no standard 'us' variant exists.
# xkbcommon would reject it+us and abort. Use only the layout; the options
# still remap Caps to Escape.
xkb_rules_layout=us,it
# xkb_rules_variant=us
xkb_rules_options=caps:swapescape

# ── Trackpad ──────────────────────────────────────────────────────────────────
# (from niri: touchpad { tap; })
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# ── Mouse ─────────────────────────────────────────────────────────────────────
# (from niri: mouse { accel-speed 0.5; scroll-method "on-button-down"; scroll-button 274; })
mouse_natural_scrolling=0
mouse_accel_speed=0.5
# Note: mango mouse settings don't expose scroll-method/scroll-button directly;
# scroll_method=4 (button) and scroll_button=274 apply to trackpad only in mango.
scroll_method=4
scroll_button=274

# ── Appearance ────────────────────────────────────────────────────────────────
# (from niri: layout { gaps 10; … })
gappih=10
gappiv=10
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=0
rootcolor=0x201b14ff
bordercolor=0x444444ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# ── Monitor Rules ────────────────────────────────────────────────────────────
# DVI-D-1: ARZOPA 2560x1600 portable (~16", ~190 DPI) — scale 1.5 → logical 1707x1067
monitorrule=name:^DVI-D-1$,width:2560,height:1600,refresh:60,x:0,y:0,scale:1.5,vrr:0,rr:0
# HDMI-A-1: Samsung 34" ultrawide 3440x1440 — placed right of DVI-D-1's logical width
monitorrule=name:^HDMI-A-1$,width:3440,height:1440,refresh:60,x:1707,y:0,scale:1,vrr:0,rr:0

# ── Tag Rules ─────────────────────────────────────────────────────────────────
# Use scroller layout on all tags to match niri's scrolling-column paradigm
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# ── Key Bindings ──────────────────────────────────────────────────────────────
# Mod = SUPER (niri uses Mod = Super key)

# Config reload
# (niri: Mod+Shift+Slash → show-hotkey-overlay — no mango equivalent; using Mod+Shift+R)
bind=SUPER+SHIFT,r,reload_config

# Session controls (from niri: Mod+X=hyprlock, Mod+Shift+E=quit)
bind=SUPER,x,spawn,dms ipc call lock lock
bind=SUPER+SHIFT,e,quit
bind=ALT,space,switch_keyboard_layout

# ── dms shell ─────────────────────────────────────────────────────────────────
# (from niri Ctrl+Space, Mod+Escape, Ctrl+Alt+*, etc.)
bind=CTRL,space,spawn,dms ipc call spotlight toggle
bind=SUPER,Escape,spawn,dms ipc call control-center toggle
bind=CTRL+ALT,o,spawn,dms ipc call dash toggle overview
bind=CTRL+ALT,m,spawn,dms ipc call dash toggle media
bind=CTRL+ALT,Delete,spawn,dms ipc call powermenu toggle
bind=CTRL+ALT,space,spawn,hyprlock
bind=CTRL+ALT,c,spawn,dms ipc call clipboard toggle
bind=CTRL+ALT,p,spawn,dms ipc call notepad toggle
bind=SUPER+CTRL,space,spawn,dms ipc call mpris playPause
bind=NONE,XF86AudioPlay,spawn,dms ipc call mpris playPause
bind=NONE,XF86AudioNext,spawn,dms ipc call mpris next
bind=NONE,XF86AudioPrev,spawn,dms ipc call mpris previous
bind=NONE,XF86MonBrightnessUp,spawn,dms ipc call brightness increment 5
bind=NONE,XF86MonBrightnessDown,spawn,dms ipc call brightness decrement 5

# ── Applications ──────────────────────────────────────────────────────────────
# (from niri: Mod+Return=kitty, Mod+D=fuzzel, Mod+P=hyprpicker, Mod+Grave=pamac)
bind=SUPER,Return,spawn,kitty
bind=SUPER,p,spawn,hyprpicker
bind=SUPER,grave,spawn,pamac-manager

# ── Screenshots ───────────────────────────────────────────────────────────────
# (from niri: Print, Alt+S, Ctrl+Print, Alt+Print)
# Note: mango has no built-in screenshot action; using grim
bind=NONE,Print,spawn,grim
bind=ALT,s,spawn,grim
bind=CTRL,Print,spawn,grim
bind=ALT,Print,spawn,sh -c "grim -g \"$(slurp)\""

# ── Audio ─────────────────────────────────────────────────────────────────────
# (from niri: XF86Audio* binds with allow-when-locked=true → bindl flag)
bindl=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05+
bindl=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05-
bindl=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Window Management ─────────────────────────────────────────────────────────
# (from niri: Alt+Q=close-window, Mod+Tab=toggle-overview)
bind=ALT,q,killclient
bind=SUPER,Tab,toggleoverview

# Focus movement (from niri: Mod+hjkl / Mod+arrows → focus-column-or-monitor-*/focus-window-or-monitor-*)
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=ALT,tab,focusstack,next
bind=ALT,SHIFT,tab,focusstack,prev

# Move / swap windows (from niri: Mod+Shift+hjkl/arrows)
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up

# Focus monitor (from niri: Mod+Alt+hjkl/arrows → focus-monitor-*)
# Arrow keys freed for resize; use hjkl only for monitor focus
bind=SUPER+ALT,h,focusmon,left
bind=SUPER+ALT,l,focusmon,right

# Move client to monitor (from niri: Ctrl+Shift+hjkl/arrows → move-column-to-monitor-*)
bind=CTRL+SHIFT,Left,tagmon,left
bind=CTRL+SHIFT,Right,tagmon,right
bind=CTRL+SHIFT,h,tagmon,left
bind=CTRL+SHIFT,l,tagmon,right

# ── Tag / Workspace Navigation ────────────────────────────────────────────────
# (from niri: Ctrl+Alt+Up/Down/j/k → focus-workspace-up/down)
bind=CTRL+ALT,Up,viewtoleft,0
bind=CTRL+ALT,Down,viewtoright,0
bind=CTRL+ALT,k,viewtoleft,0
bind=CTRL+ALT,j,viewtoright,0

# Move window to adjacent tag (from niri: Shift+Alt+Up/Down/j/k → move-column-to-workspace-up/down)
bind=SHIFT+ALT,Up,tagtoleft,0
bind=SHIFT+ALT,Down,tagtoright,0
bind=SHIFT+ALT,k,tagtoleft,0
bind=SHIFT+ALT,j,tagtoright,0

# Switch to tag by number (from niri: Mod+1-9 → focus-workspace N)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Move window to tag by number (from niri: Shift+Alt+1-9 → move-column-to-workspace N)
bind=SHIFT+ALT,1,tag,1,0
bind=SHIFT+ALT,2,tag,2,0
bind=SHIFT+ALT,3,tag,3,0
bind=SHIFT+ALT,4,tag,4,0
bind=SHIFT+ALT,5,tag,5,0
bind=SHIFT+ALT,6,tag,6,0
bind=SHIFT+ALT,7,tag,7,0
bind=SHIFT+ALT,8,tag,8,0
bind=SHIFT+ALT,9,tag,9,0

# ── Scroller / Column Controls ────────────────────────────────────────────────
# (from niri: Mod+R=switch-preset-column-width, Mod+Minus/Equal=resize,
#             Mod+Shift+Minus/Equal=height resize, Mod+F=maximize-column,
#             Mod+Shift+F=fullscreen, Mod+C=center-column)
bind=SUPER,r,switch_proportion_preset
bind=SUPER,minus,resizewin,-50,0
bind=SUPER,equal,resizewin,+50,0
bind=SUPER+SHIFT,minus,resizewin,0,-50
bind=SUPER+SHIFT,equal,resizewin,0,+50
# Full-width shortcut (from niri: Mod+Ctrl+F = expand-column-to-available-width)
bind=ALT,e,set_proportion,1.0

# Scroller stacking (from niri: Mod+BracketLeft/Right, Mod+Comma/Period)
bind=ALT+SUPER+CTRL,h,scroller_stack,left
bind=ALT+SUPER+CTRL,l,scroller_stack,right
bind=ALT+SUPER+CTRL,k,scroller_stack,up
bind=ALT+SUPER+CTRL,j,scroller_stack,down

# Dwindle split direction toggle
bind=ALT+SHIFT,Return,dwindle_toggle_split_direction

# Switch layout
bind=SUPER,n,switch_layout
bind=SUPER,e,setlayout,tile
bind=SUPER,s,setlayout,scroller
bind=SUPER,d,setlayout,dwindle
bind=SUPER,v,setlayout,deck
bind=SUPER,m,setlayout,monocle


# ── Window State ──────────────────────────────────────────────────────────────
# (from niri: Mod+F=maximize-column, Mod+Shift+F=fullscreen, Mod+C=center-column)
bind=SUPER,f,togglemaximizescreen
bind=SUPER+SHIFT,f,togglefullscreen
bind=ALT,f,togglefullscreen
bind=ALT+SHIFT,f,togglefakefullscreen
# center: only meaningful for floating windows
bind=SUPER,c,centerwin
# toggle floating (from niri: Mod+Alt+Space → toggle-window-floating)
bind=SUPER+ALT,space,togglefloating
bind=SHIFT+ALT,space,toggle_all_floating
# toggle global/pinned (from niri: similar to sticky)
bind=SUPER,g,toggleglobal
# minimize / restore
bind=SUPER,i,minimized
bind=SUPER+SHIFT,i,restore_minimized
# overlay
bind=SUPER,o,toggleoverlay
# scratchpad
bind=ALT,z,toggle_scratchpad

# ── gaps ──────────────────────────────────────────────────────────────────────
bind=ALT+SHIFT,x,incgaps,1
bind=ALT+SHIFT,z,incgaps,-1
bind=ALT+SHIFT,r,togglegaps

# ── Move floating window ──────────────────────────────────────────────────────
# CTRL+SHIFT+Left/Right are already used for tagmon; use SUPER+CTRL for movewin
bind=SUPER+CTRL,Up,movewin,+0,-50
bind=SUPER+CTRL,Down,movewin,+0,+50
bind=SUPER+CTRL,Left,movewin,-50,+0
bind=SUPER+CTRL,Right,movewin,+50,+0

# ── Resize floating window ────────────────────────────────────────────────────
# CTRL+ALT+Up/Down are already used for tag navigation; use SUPER+ALT for resize
bind=SUPER+ALT,Up,resizewin,+0,-50
bind=SUPER+ALT,Down,resizewin,+0,+50
bind=SUPER+ALT,Left,resizewin,-50,+0
bind=SUPER+ALT,Right,resizewin,+50,+0

# ── Mouse Bindings ────────────────────────────────────────────────────────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# ── Axis Bindings ─────────────────────────────────────────────────────────────
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# ── Layer Rules ───────────────────────────────────────────────────────────────
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
